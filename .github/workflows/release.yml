name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: x86_64-apple-darwin
            runner: macos-latest
          - target: aarch64-apple-darwin
            runner: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p bitscout-cli

      - name: Package
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          ARCHIVE_NAME="bitscout-${TAG}-${{ matrix.target }}"
          mkdir -p "dist/${ARCHIVE_NAME}"
          cp "target/${{ matrix.target }}/release/bitscout" "dist/${ARCHIVE_NAME}/"
          cp README.md LICENSE* 2>/dev/null dist/${ARCHIVE_NAME}/ || true
          cd dist
          tar czf "${ARCHIVE_NAME}.tar.gz" "${ARCHIVE_NAME}"
          echo "ASSET=dist/${ARCHIVE_NAME}.tar.gz" >> $GITHUB_ENV

      - uses: actions/upload-artifact@v4
        with:
          name: bitscout-${{ matrix.target }}
          path: ${{ env.ASSET }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum *.tar.gz > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/SHA256SUMS.txt

      - name: Update Homebrew formula
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          if [ -z "$TAP_TOKEN" ]; then
            echo "TAP_TOKEN not set, skipping Homebrew update"
            exit 0
          fi

          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          cd artifacts

          SHA_DARWIN_ARM64=$(sha256sum "bitscout-${TAG}-aarch64-apple-darwin.tar.gz" | cut -d' ' -f1)
          SHA_DARWIN_X86=$(sha256sum "bitscout-${TAG}-x86_64-apple-darwin.tar.gz" | cut -d' ' -f1)
          SHA_LINUX_ARM64=$(sha256sum "bitscout-${TAG}-aarch64-unknown-linux-gnu.tar.gz" | cut -d' ' -f1)
          SHA_LINUX_X86=$(sha256sum "bitscout-${TAG}-x86_64-unknown-linux-musl.tar.gz" | cut -d' ' -f1)

          cat > /tmp/bitscout.rb <<FORMULA
          class Bitscout < Formula
            desc "SIMD-accelerated search toolkit for AI Agents"
            homepage "https://github.com/rainyulei/BitScout"
            license "MIT"
            version "${VERSION}"

            on_macos do
              on_arm do
                url "https://github.com/rainyulei/BitScout/releases/download/${TAG}/bitscout-${TAG}-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_DARWIN_ARM64}"
              end
              on_intel do
                url "https://github.com/rainyulei/BitScout/releases/download/${TAG}/bitscout-${TAG}-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_DARWIN_X86}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/rainyulei/BitScout/releases/download/${TAG}/bitscout-${TAG}-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_LINUX_ARM64}"
              end
              on_intel do
                url "https://github.com/rainyulei/BitScout/releases/download/${TAG}/bitscout-${TAG}-x86_64-unknown-linux-musl.tar.gz"
                sha256 "${SHA_LINUX_X86}"
              end
            end

            def install
              bin.install "bitscout"
            end

            def post_install
              %w[rg grep find fd cat].each do |cmd|
                (bin/cmd).unlink if (bin/cmd).symlink?
                (bin/cmd).make_symlink(bin/"bitscout")
              end
            end

            def caveats
              <<~EOS
                BitScout symlinks (rg, grep, find, fd, cat) have been created in #{HOMEBREW_PREFIX}/bin.
                These take priority over system commands when #{HOMEBREW_PREFIX}/bin is first in PATH.
              EOS
            end

            test do
              assert_match "bitscout", shell_output("#{bin}/bitscout --help")
            end
          end
          FORMULA

          # Remove leading whitespace from heredoc
          sed -i 's/^          //' /tmp/bitscout.rb

          cd /tmp
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/rainyulei/homebrew-tap.git"
          cd homebrew-tap
          mkdir -p Formula
          cp /tmp/bitscout.rb Formula/bitscout.rb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/bitscout.rb
          git commit -m "Update BitScout to ${TAG}" || echo "No changes"
          git push
